<!DOCTYPE html>
<html>
<head>
<title>Take Attendance</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
body {
    background: linear-gradient(135deg,#43cea2,#185a9d);
    font-family: Arial, sans-serif;
}

/* CONTAINER */
.container {
    text-align: center;
    margin-top: 30px;
}

/* TABLE */
table {
    margin: auto;
    width: 80%;
    border-collapse: collapse;
    background: white;
    border-radius: 12px;
    overflow: hidden;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

th {
    background: #333;
    color: white;
}

tr:hover {
    background: #f5f5f5;
}

/* BUTTON BASE */
.btn {
    padding: 12px 18px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    display: inline-block;
    margin: 10px;
    font-weight: bold;
    transition: 0.3s;
}

/* SUBMIT BUTTON */
.submit-btn {
    background: linear-gradient(135deg,#00c9ff,#92fe9d);
}

/* BACK BUTTON (PREMIUM) */
.back-btn {
    background: linear-gradient(135deg,#ff9966,#ff5e62);
}

.back-btn:hover {
    transform: scale(1.1);
}

/* SUBMIT HOVER */
.submit-btn:hover {
    transform: scale(1.1);
}
</style>

</head>

<body>

<div class="container">

<h2>📋 Take Attendance</h2>

<form method="POST">

<table>
<tr>
<th>Name</th>
<th>Present</th>
<th>Absent</th>
</tr>

{% for s in students %}
<tr>
<td>{{ s.name }}</td>

<td>
<input type="radio" name="{{ s.id }}" value="Present" required>
</td>

<td>
<input type="radio" name="{{ s.id }}" value="Absent">
</td>

</tr>
{% endfor %}

</table>

<br>

<button class="btn submit-btn">✅ Submit Attendance</button>

</form>

<br>

<!-- BACK BUTTON -->
<a class="btn back-btn" href="/dashboard">
⬅ Back to Dashboard
</a>

</div>

</body>
</html>
