<!DOCTYPE html>
<html>
<head>
<title>Manage Students</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
body {
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    font-family: Arial;
}

.container {
    text-align: center;
    margin-top: 40px;
}

table {
    margin: auto;
    width: 80%;
    border-collapse: collapse;
    background: white;
    border-radius: 12px;
    overflow: hidden;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

th {
    background: #333;
    color: white;
}

tr:hover {
    background: #f5f5f5;
}

/* BUTTONS */
.btn {
    padding: 8px 14px;
    border-radius: 10px;
    color: white;
    text-decoration: none;
}

.delete-btn {
    background: linear-gradient(135deg,#ff0000,#ff6a6a);
}

.back-btn {
    background: linear-gradient(135deg,#00c9ff,#92fe9d);
}

.btn:hover {
    transform: scale(1.1);
}
</style>

</head>

<body>

<div class="container">

<h2>👨‍🎓 Manage Students</h2>

<table>
<tr>
<th>Name</th>
<th>Roll</th>
<th>Phone</th>
<th>Action</th>
</tr>

{% for s in students %}
<tr>
<td>{{ s.name }}</td>
<td>{{ s.roll }}</td>
<td>{{ s.phone }}</td>
<td>
<a class="btn delete-btn"
   href="/delete_student/{{ s.id }}"
   onclick="return confirm('Are you sure?')">
   Delete
</a>
</td>
</tr>
{% endfor %}

</table>

<br>

<a class="btn back-btn" href="/dashboard">⬅ Back to Dashboard</a>

</div>

</body>
</html>
