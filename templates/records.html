<!DOCTYPE html>
<html>
<head>
<title>Records</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
body {
    background: linear-gradient(135deg,#a18cd1,#fbc2eb);
    font-family: Arial, sans-serif;
}

/* CONTAINER */
.container {
    text-align: center;
    margin-top: 30px;
}

/* DATE FILTER */
.filter-box {
    margin: 20px 0;
}

input[type="date"] {
    padding: 10px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: linear-gradient(135deg,#00c9ff,#92fe9d);
    font-weight: bold;
}

/* BUTTON BASE */
.btn {
    padding: 12px 18px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    display: inline-block;
    margin: 8px;
    font-weight: bold;
    transition: 0.3s;
}

/* FILTER BUTTON */
.filter-btn {
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
}

/* BACK BUTTON */
.back-btn {
    background: linear-gradient(135deg,#ff9966,#ff5e62);
}

.back-btn:hover {
    transform: scale(1.1);
}

/* DOWNLOAD BUTTON (PREMIUM) */
.download-btn {
    background: linear-gradient(135deg,#00f260,#0575e6);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.download-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

/* TABLE */
table {
    margin: auto;
    border-collapse: collapse;
    width: 80%;
    background: white;
    border-radius: 12px;
    overflow: hidden;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

th {
    background: #333;
    color: white;
}

tr:hover {
    background: #f5f5f5;
}
</style>

</head>

<body>

<div class="container">

<h2>📊 Attendance Records</h2>

<!-- DATE FILTER -->
<div class="filter-box">
<form method="GET">
<input type="date" name="date">
<button class="btn filter-btn">🔍 Filter</button>
</form>
</div>

<!-- TABLE -->
<table>
<tr>
<th>Name</th>
<th>Status</th>
<th>Date</th>
</tr>

{% for r in records %}
<tr>
<td>{{ r.name }}</td>
<td>{{ r.status }}</td>
<td>{{ r.date }}</td>
</tr>
{% endfor %}

</table>

<br>

<!-- BUTTONS -->
<a class="btn back-btn" href="/dashboard">⬅ Back to Dashboard</a>

<a class="btn download-btn" href="/export">
⬇ Download Excel
</a>

</div>

</body>
</html>
